<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Template Library — AI Prompt 模板库</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222e; --border: #2e2e3e;
  --accent: #7c3aed; --accent2: #06b6d4; --accent3: #10b981; --accent4: #f59e0b;
  --text: #e2e8f0; --muted: #94a3b8;
}
body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }

header {
  background: linear-gradient(135deg, #1a0a2e 0%, #0f1a2e 50%, #0a1a1a 100%);
  border-bottom: 1px solid var(--border); padding: 20px 32px;
  position: sticky; top: 0; z-index: 100;
}
.header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { font-size: 28px; }
.logo-text { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #a78bfa, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.logo-sub { font-size: 12px; color: var(--muted); }
.header-stats { display: flex; gap: 20px; margin-left: auto; }
.stat { text-align: center; }
.stat-num { font-size: 18px; font-weight: 700; color: var(--accent2); }
.stat-label { font-size: 11px; color: var(--muted); }

.search-section { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; }
.search-inner { max-width: 1400px; margin: 0 auto; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.search-wrap { flex: 1; min-width: 280px; position: relative; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
#searchInput {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 16px 10px 42px; color: var(--text); font-size: 15px; outline: none;
}
#searchInput:focus { border-color: var(--accent); }
#searchInput::placeholder { color: var(--muted); }
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn {
  padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2);
  color: var(--muted); font-size: 13px; cursor: pointer; transition: all .2s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

.main { max-width: 1400px; margin: 0 auto; padding: 24px 32px; display: grid; grid-template-columns: 220px 1fr; gap: 24px; }

.sidebar-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.cat-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px;
  cursor: pointer; transition: all .15s; color: var(--muted); font-size: 14px; margin-bottom: 2px;
}
.cat-item:hover { background: var(--surface); color: var(--text); }
.cat-item.active { background: rgba(124,58,237,.15); color: #a78bfa; border: 1px solid rgba(124,58,237,.3); }
.cat-count { margin-left: auto; font-size: 11px; background: var(--surface2); padding: 2px 7px; border-radius: 99px; }

.grid-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.grid-title { font-size: 18px; font-weight: 700; }
.grid-count { font-size: 13px; color: var(--muted); }
.sort-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; color: var(--text); font-size: 13px; outline: none; cursor: pointer; }

.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
}
.card:before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); opacity: 0; transition: opacity .2s; }
.card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,.15); }
.card:hover:before { opacity: 1; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.card-icon { font-size: 24px; }
.card-actions { display: flex; gap: 5px; }
.btn-fav {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.btn-fav:hover { border-color: var(--accent4); color: var(--accent4); }
.btn-fav.active { border-color: var(--accent4); color: var(--accent4); background: rgba(245,158,11,.1); }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
.card-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
.tag-cat { background: rgba(124,58,237,.2); color: #a78bfa; }
.tag-model { background: rgba(6,182,212,.15); color: #67e8f9; }
.tag-level-beginner { background: rgba(16,185,129,.15); color: #6ee7b7; }
.tag-level-intermediate { background: rgba(245,158,11,.15); color: #fcd34d; }
.tag-level-advanced { background: rgba(239,68,68,.15); color: #fca5a5; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.uses-count { font-size: 11px; color: var(--muted); }
.btn-copy {
  padding: 6px 14px; border-radius: 7px; background: linear-gradient(135deg, var(--accent), #6d28d9);
  border: none; color: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s;
}
.btn-copy:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(124,58,237,.4); }
.btn-copy.done { background: linear-gradient(135deg, var(--accent3), #059669); }

.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 1000;
  backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  max-width: 680px; width: 100%; max-height: 88vh; overflow-y: auto; padding: 28px; position: relative;
}
.modal-close {
  position: absolute; top: 16px; right: 16px; width: 30px; height: 30px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border); color: var(--muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 18px; line-height: 1;
}
.modal-close:hover { color: var(--text); }
.modal-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.modal-icon { font-size: 36px; }
.modal-title { font-size: 20px; font-weight: 700; }
.modal-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
.modal-desc { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 16px; }
.section-label { font-size: 12px; font-weight: 700; color: var(--accent2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.prompt-box {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px; font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12.5px;
  line-height: 1.8; color: #c4b5fd; white-space: pre-wrap; word-break: break-word; margin-bottom: 16px;
}
.vars-list { margin-bottom: 18px; display: flex; flex-direction: column; gap: 6px; }
.var-item { display: flex; gap: 10px; align-items: center; }
.var-name { font-family: monospace; background: rgba(6,182,212,.12); color: var(--accent2); padding: 3px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; }
.var-desc { font-size: 13px; color: var(--muted); }
.modal-actions { display: flex; gap: 10px; }
.btn-primary {
  flex: 1; padding: 11px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), #6d28d9);
  border: none; color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,58,237,.4); }
.btn-primary.done { background: linear-gradient(135deg, var(--accent3), #059669); }
.btn-secondary {
  padding: 11px 18px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); font-size: 14px; cursor: pointer; transition: all .2s;
}
.btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }
.btn-secondary.active { border-color: var(--accent4); color: var(--accent4); background: rgba(245,158,11,.1); }

.empty { text-align: center; padding: 80px 20px; color: var(--muted); grid-column: 1/-1; }
.empty-icon { font-size: 48px; margin-bottom: 14px; }

.toast {
  position: fixed; bottom: 28px; right: 28px; background: var(--accent3);
  color: white; padding: 11px 18px; border-radius: 10px; font-size: 14px; font-weight: 600;
  transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 9999;
}
.toast.show { transform: translateY(0); opacity: 1; }

@media (max-width: 860px) {
  .main { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  header, .search-section { padding: 14px 16px; }
  .main { padding: 16px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">📚</span>
      <span class="logo-text">Prompt Library</span>
      <span class="logo-sub" style="margin-left:8px">AI Prompt 模板库</span>
    </div>
    <div class="header-stats">
      <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">模板总数</div></div>
      <div class="stat"><div class="stat-num" id="catCount">0</div><div class="stat-label">分类</div></div>
      <div class="stat"><div class="stat-num" id="favCount">0</div><div class="stat-label">已收藏</div></div>
    </div>
  </div>
</header>

<div class="search-section">
  <div class="search-inner">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索模板名称、描述、分类..." oninput="onSearch()">
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setLevel('all',this)">全部</button>
      <button class="filter-btn" onclick="setLevel('beginner',this)">🟢 入门</button>
      <button class="filter-btn" onclick="setLevel('intermediate',this)">🟡 进阶</button>
      <button class="filter-btn" onclick="setLevel('advanced',this)">🔴 高阶</button>
      <button class="filter-btn" onclick="setLevel('fav',this)">⭐ 已收藏</button>
    </div>
  </div>
</div>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-title">分类</div>
    <div id="catList"></div>
  </aside>
  <main>
    <div class="grid-header">
      <div>
        <div class="grid-title" id="gridTitle">所有模板</div>
        <div class="grid-count" id="gridCount"></div>
      </div>
      <select class="sort-select" id="sortSel" onchange="render()">
        <option value="default">默认排序</option>
        <option value="popular">按热度</option>
        <option value="name">按名称</option>
      </select>
    </div>
    <div class="cards-grid" id="grid"></div>
  </main>
</div>

<div class="modal-overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-header">
      <div class="modal-icon" id="mIcon"></div>
      <div><div class="modal-title" id="mTitle"></div><div class="modal-meta" id="mMeta"></div></div>
    </div>
    <div class="modal-desc" id="mDesc"></div>
    <div class="section-label">Prompt 模板</div>
    <div class="prompt-box" id="mPrompt"></div>
    <div id="mVarsWrap"></div>
    <div class="modal-actions">
      <button class="btn-primary" id="mCopyBtn" onclick="copyModal()">📋 复制 Prompt</button>
      <button class="btn-secondary" id="mFavBtn" onclick="toggleFavModal()">⭐ 收藏</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DATA = [
  {id:1,icon:'✍️',cat:'写作',title:'爆款标题生成器',desc:'输入主题，生成10个不同风格的高点击率标题，覆盖悬念/数字/对比/痛点等。',level:'beginner',model:'All',uses:2341,
  prompt:`你是一位资深内容运营专家，擅长创作高点击率标题。

请根据以下主题，生成10个不同风格的爆款标题：

主题：{{topic}}
目标平台：{{platform}}（如微信公众号/小红书/知乎/B站）
目标读者：{{audience}}

要求：
- 每个标题控制在30字以内
- 覆盖：数字型、悬念型、对比型、痛点型、福利型
- 附上每个标题的风格标注
- 最后推荐你认为最佳的2个，说明理由`,
  vars:[{n:'{{topic}}',d:'文章主题或关键词'},{n:'{{platform}}',d:'发布平台'},{n:'{{audience}}',d:'目标读者群体'}]},

  {id:2,icon:'📝',cat:'写作',title:'小红书爆文创作',desc:'专为小红书优化的内容创作提示词，含封面文案、正文结构、互动引导。',level:'beginner',model:'GPT-4o/Claude',uses:1892,
  prompt:`你是一位拥有50万粉丝的小红书博主，请帮我创作一篇爆文。

主题：{{topic}}
产品/服务：{{product}}
核心卖点：{{selling_points}}

请按以下格式输出：

【封面标题】（最多10字，含emoji）
【副标题】（20字内）
【正文】
- 开头钩子（前3行留住读者）
- 干货内容（3-5个要点，每点配emoji）
- 真实故事/场景
- 结尾互动引导

【话题标签】（10个精准标签）`,
  vars:[{n:'{{topic}}',d:'笔记主题'},{n:'{{product}}',d:'推广产品（可选）'},{n:'{{selling_points}}',d:'核心卖点'}]},

  {id:3,icon:'📧',cat:'写作',title:'商务邮件润色',desc:'将粗糙草稿升级为专业、清晰、有说服力的商务邮件，附3个主题行备选。',level:'beginner',model:'All',uses:1543,
  prompt:`请将以下邮件草稿改写为一封专业的商务邮件。

原始草稿：
{{draft}}

改写要求：
- 语气：{{tone}}（正式/友好专业/紧迫/感谢）
- 目标：{{goal}}
- 收件人职级：{{recipient}}

请输出：
1. 邮件主题行（3个备选）
2. 邮件正文
3. 改动说明（你做了哪些优化）`,
  vars:[{n:'{{draft}}',d:'原始邮件草稿'},{n:'{{tone}}',d:'邮件语气'},{n:'{{goal}}',d:'邮件目标'},{n:'{{recipient}}',d:'收件人级别'}]},

  {id:4,icon:'💻',cat:'编程',title:'Code Review 专家',desc:'从性能、安全、可维护性三个维度深度分析代码，给出专业建议和优化示例。',level:'intermediate',model:'Claude/GPT-4',uses:3201,
  prompt:`你是一位有15年经验的高级工程师，请对以下代码进行全面 Code Review。

代码语言：{{language}}
代码功能：{{description}}

\`\`\`{{language}}
{{code}}
\`\`\`

请从以下维度分析：

**🚨 安全风险**（严重/中等/低，附修复建议）

**⚡ 性能问题**（复杂度分析，瓶颈，优化方案）

**🏗️ 代码质量**
- 命名规范
- 函数职责（单一原则）
- 错误处理
- 重复代码

**📚 可维护性**（注释、测试覆盖建议）

**✅ 优化后版本**（关键改进的代码示例）`,
  vars:[{n:'{{language}}',d:'编程语言'},{n:'{{description}}',d:'代码功能说明'},{n:'{{code}}',d:'待review的代码'}]},

  {id:5,icon:'🐛',cat:'编程',title:'Debug 助手',desc:'分析错误信息，找出根因，给出分步骤调试方案和修复代码。',level:'beginner',model:'All',uses:2876,
  prompt:`我遇到了一个 Bug，请帮我分析和解决。

**错误信息：**
\`\`\`
{{error_message}}
\`\`\`

**相关代码：**
\`\`\`{{language}}
{{code}}
\`\`\`

**已尝试的解决方案：**{{tried}}
**运行环境：**{{environment}}

请输出：
**🔍 错误原因分析**
**🎯 根本原因**
**🔧 修复方案**（含修复代码）
**🛡️ 预防措施**`,
  vars:[{n:'{{error_message}}',d:'完整错误信息'},{n:'{{language}}',d:'编程语言'},{n:'{{code}}',d:'相关代码片段'},{n:'{{tried}}',d:'已尝试的方法'},{n:'{{environment}}',d:'运行环境'}]},

  {id:6,icon:'🏗️',cat:'编程',title:'API 接口设计',desc:'输入需求，输出规范的 RESTful API 设计文档，含路由、参数、响应、错误码。',level:'intermediate',model:'Claude/GPT-4',uses:1234,
  prompt:`你是一位后端架构师，请为以下需求设计 RESTful API。

**系统描述：**{{system_desc}}
**功能模块：**{{features}}

请输出完整 API 设计文档：

## 设计原则
## 数据模型（核心实体字段定义）
## API 路由表
| Method | Path | 描述 | 权限 |
## 详细接口说明（URL/Headers/Request/Response/错误码）
## 安全设计（认证/权限控制）
## 版本策略`,
  vars:[{n:'{{system_desc}}',d:'系统描述'},{n:'{{features}}',d:'功能模块列表'}]},

  {id:7,icon:'🎯',cat:'产品',title:'PRD 生成器',desc:'输入产品想法，自动生成结构完整的产品需求文档（PRD），含用户故事和优先级。',level:'intermediate',model:'Claude/GPT-4o',uses:1876,
  prompt:`你是一位资深产品经理，请根据以下需求生成完整 PRD。

**需求描述：**{{idea}}
**目标用户：**{{target_user}}
**核心目标：**{{goal}}

# {{product_name}} PRD v1.0

## 1. 产品概述（背景/定位/KPI）
## 2. 用户画像（主次用户，含痛点）
## 3. 功能需求（用户故事格式：作为[用户]，我希望[功能]，以便[价值]）
## 4. 核心流程（关键用户路径）
## 5. 非功能需求（性能/安全/兼容性）
## 6. 数据需求
## 7. 风险与依赖
## 8. 优先级排序（MoSCoW）`,
  vars:[{n:'{{idea}}',d:'产品想法描述'},{n:'{{target_user}}',d:'目标用户'},{n:'{{goal}}',d:'产品核心目标'},{n:'{{product_name}}',d:'产品名称'}]},

  {id:8,icon:'📊',cat:'产品',title:'竞品分析报告',desc:'生成系统化竞品分析，含对比表格、差异化机会、SWOT 分析和战略建议。',level:'intermediate',model:'Claude/GPT-4',uses:1432,
  prompt:`请帮我对以下产品进行竞品分析。

**我方产品：**{{my_product}}
**主要竞品：**{{competitors}}
**分析侧重：**{{focus}}

## 市场格局（规模/趋势/玩家）
## 对比矩阵
| 维度 | 我方 | 竞品1 | 竞品2 |
| 功能/用户/定价/市场份额/技术壁垒 |
## 差异化机会（3-5个未满足需求）
## SWOT 分析
## 战略建议（近期/中期/长期）`,
  vars:[{n:'{{my_product}}',d:'我方产品'},{n:'{{competitors}}',d:'竞品列表'},{n:'{{focus}}',d:'分析重点'}]},

  {id:9,icon:'🚀',cat:'营销',title:'产品发布公告',desc:'生成多平台产品发布公告，覆盖官网、社媒、邮件三种版本，语气精准适配。',level:'beginner',model:'All',uses:2103,
  prompt:`请为以下产品发布撰写多平台公告文案。

**产品名称：**{{product_name}}
**核心功能：**{{features}}
**目标用户：**{{audience}}
**发布时间：**{{launch_date}}
**定价：**{{pricing}}

let currentCat = 'all', currentLevel = 'all', currentModal = null;
let favs = JSON.parse(localStorage.getItem('pl_favs') || '[]');

function isFav(id) { return favs.includes(id); }
function toggleFav(id) {
  if (isFav(id)) favs = favs.filter(f => f !== id);
  else favs.push(id);
  localStorage.setItem('pl_favs', JSON.stringify(favs));
  updateFavCount();
  render();
}

function updateFavCount() {
  document.getElementById('favCount').textContent = favs.length;
}

function onSearch() {
  // 搜索时自动切回全部分类，避免分类+搜索叠加导致空结果
  if (document.getElementById('searchInput').value && currentCat !== 'all') {
    currentCat = 'all';
    document.querySelectorAll('.cat-item').forEach(b => b.classList.toggle('active', b.dataset.cat === 'all'));
    document.getElementById('gridTitle').textContent = '所有模板';
  }
  render();
}

function setLevel(l, btn) {
  currentLevel = l;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setCat(c) {
  currentCat = c;
  document.querySelectorAll('.cat-item').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === c);
  });
  document.getElementById('gridTitle').textContent = c === 'all' ? '所有模板' : c;
  render();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSel').value;
  let list = DATA.filter(t => {
    if (currentCat !== 'all' && t.cat !== currentCat) return false;
    if (currentLevel === 'fav' && !isFav(t.id)) return false;
    if (currentLevel !== 'all' && currentLevel !== 'fav' && t.level !== currentLevel) return false;
    if (q) { return (t.title+t.desc+t.cat+t.model).toLowerCase().includes(q); }
    return true;
  });
  if (sort === 'popular') list.sort((a,b) => b.uses - a.uses);
  if (sort === 'name') list.sort((a,b) => a.title.localeCompare(b.title));
  return list;
}

const LEVEL_MAP = {beginner:'🟢 入门', intermediate:'🟡 进阶', advanced:'🔴 高阶'};

function render() {
  const list = getFiltered();
  document.getElementById('gridCount').textContent = `${list.length} 个模板`;
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>未找到匹配模板</div></div>';
    return;
  }
  grid.innerHTML = list.map(t => `
    <div class="card" onclick="openModal(${t.id})">
      <div class="card-top">
        <span class="card-icon">${t.icon}</span>
        <div class="card-actions">
          <button class="btn-fav ${isFav(t.id)?'active':''}" onclick="event.stopPropagation();toggleFav(${t.id})" title="收藏">${isFav(t.id)?'⭐':'☆'}</button>
        </div>
      </div>
      <div class="card-title">${t.title}</div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-tags">
        <span class="tag tag-cat">${t.cat}</span>
        <span class="tag tag-model">${t.model}</span>
        <span class="tag tag-level-${t.level}">${LEVEL_MAP[t.level]}</span>
      </div>
      <div class="card-footer">
        <span class="uses-count">📋 ${t.uses.toLocaleString()} 次使用</span>
        <button class="btn-copy" id="copy-${t.id}" onclick="event.stopPropagation();quickCopy(${t.id})">复制</button>
      </div>
    </div>
  `).join('');
}

function renderCats() {
  const cats = ['all', ...new Set(DATA.map(t => t.cat))];
  const catIcons = {all:'🗂️',写作:'✍️',编程:'💻',产品:'🎯',营销:'🚀',分析:'🔬',沟通:'💬',翻译:'🌍','AI提示':'🤖',学习:'📚',商业:'💰',研究:'🔍',创意:'🎨'};
  document.getElementById('catList').innerHTML = cats.map(c => {
    const count = c === 'all' ? DATA.length : DATA.filter(t => t.cat === c).length;
    return `<div class="cat-item${c===currentCat?' active':''}" data-cat="${c}" onclick="setCat('${c}')">
      <span class="cat-icon">${catIcons[c]||'📁'}</span>
      <span>${c === 'all' ? '全部' : c}</span>
      <span class="cat-count">${count}</span>
    </div>`;
  }).join('');
  document.getElementById('catCount').textContent = cats.length - 1;
  document.getElementById('totalCount').textContent = DATA.length;
}

function quickCopy(id) {
  const t = DATA.find(x => x.id === id);
  const btn = document.getElementById('copy-'+id);
  const doSuccess = () => {
    if (btn) { btn.textContent = '✅'; btn.classList.add('done'); setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('done'); }, 1500); }
    showToast('✅ Prompt 已复制到剪贴板');
  };
  const doFail = () => {
    // fallback: select text via textarea
    const ta = document.createElement('textarea');
    ta.value = t.prompt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); doSuccess(); } catch(e) { showToast('❌ 复制失败，请手动复制'); }
    document.body.removeChild(ta);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(t.prompt).then(doSuccess).catch(doFail);
  } else { doFail(); }
}

function openModal(id) {
  currentModal = DATA.find(x => x.id === id);
  const t = currentModal;
  document.getElementById('mIcon').textContent = t.icon;
  document.getElementById('mTitle').textContent = t.title;
  document.getElementById('mMeta').textContent = `${t.cat} · ${t.model} · ${LEVEL_MAP[t.level]} · ${t.uses.toLocaleString()} 次使用`;
  document.getElementById('mDesc').textContent = t.desc;
  document.getElementById('mPrompt').textContent = t.prompt;
  const favBtn = document.getElementById('mFavBtn');
  favBtn.textContent = isFav(t.id) ? '⭐ 已收藏' : '☆ 收藏';
  favBtn.className = 'btn-secondary' + (isFav(t.id) ? ' active' : '');
  const varsWrap = document.getElementById('mVarsWrap');
  if (t.vars && t.vars.length) {
    varsWrap.innerHTML = `<div class="section-label" style="margin-bottom:10px">变量说明</div>
      <div class="vars-list">${t.vars.map(v => `<div class="var-item"><span class="var-name">${v.n}</span><span class="var-desc">${v.d}</span></div>`).join('')}</div>`;
  } else { varsWrap.innerHTML = ''; }
  const copyBtn = document.getElementById('mCopyBtn');
  copyBtn.textContent = '📋 复制 Prompt'; copyBtn.classList.remove('done');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentModal = null;
}

function copyModal() {
  if (!currentModal) return;
  const btn = document.getElementById('mCopyBtn');
  const doSuccess = () => {
    btn.textContent = '✅ 已复制！'; btn.classList.add('done');
    setTimeout(() => { btn.textContent = '📋 复制 Prompt'; btn.classList.remove('done'); }, 2000);
    showToast('✅ Prompt 已复制到剪贴板');
  };
  const doFail = () => {
    const ta = document.createElement('textarea');
    ta.value = currentModal.prompt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); doSuccess(); } catch(e) { showToast('❌ 复制失败，请手动复制'); }
    document.body.removeChild(ta);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(currentModal.prompt).then(doSuccess).catch(doFail);
  } else { doFail(); }
}

function toggleFavModal() {
  if (!currentModal) return;
  toggleFav(currentModal.id);
  const favBtn = document.getElementById('mFavBtn');
  const isFaved = isFav(currentModal.id);
  favBtn.textContent = isFaved ? '⭐ 已收藏' : '☆ 收藏';
  favBtn.className = 'btn-secondary' + (isFaved ? ' active' : '');
  showToast(isFaved ? '⭐ 已加入收藏' : '已取消收藏');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderCats();
updateFavCount();
render();
</script>
</body>
</html>
